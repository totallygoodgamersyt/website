<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Totally Good Gamers</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: black;
      cursor: pointer;
      overflow: hidden;
    }

    /* Background image */
    .bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url("tgg-background.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      z-index: -2;
    }

    /* Dark overlay */
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.55);
      z-index: -1;
    }

    /* Content */
    .content {
      text-align: center;
      padding-top: 80px;
    }

    a {
      color: #ff4d4d;
      text-decoration: none;
      font-weight: bold;
    }

    a:hover {
      text-decoration: underline;
    }

    /* Click screen */
    #clickOverlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      z-index: 10;
    }

    iframe {
      display: none;
    }
  </style>
</head>

<body onclick="startMusic()">

  <!-- Background -->
  <div class="bg"></div>
  

  <!-- Click to start -->
  <div id="clickOverlay">Click for Epic TGG Swagginess</div>

  <!-- Content -->
  <div class="content">
    <h1>Totally Good Gamers : Official Website</h1>
    <p>coming as soon as Nick stops being lazy 😎</p>

    <p>
      🔗 YouTube:
      <a href="https://www.youtube.com/@TotallyGoodGamers" target="_blank">
        Totally Good Gamers Channel
      </a>
    </p>
    <p>
      🔗 Discord:
      <a href="https://www.discord.gg/tggyt" target="_blank">
        Discord Server
      </a>
    </p>
  </div>

  <!-- Hidden YouTube music -->
  <iframe id="music"
    src="https://www.youtube.com/embed/r_KrfgRyVD4?enablejsapi=1"
    allow="autoplay; encrypted-media">
  </iframe>

  <script>
    function startMusic() {
      document.getElementById("clickOverlay").style.display = "none";

      document.getElementById("music").src =
        "https://www.youtube.com/embed/r_KrfgRyVD4?autoplay=1&mute=0";
    }
  </script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6956320025992349"
     crossorigin="anonymous"></script>
</body>
